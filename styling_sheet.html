<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Styling Sheet – Kaufland Ice Cream 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;color:#111;background:#f5f5f3}

/* ── Header ── */
.page-header{background:#111;color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.page-header h1{font-size:18px;font-weight:700;letter-spacing:.3px}
.page-header p{font-size:12px;color:#999;margin-top:2px}
.header-actions{display:flex;gap:10px;flex-shrink:0}
.btn{padding:8px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-print{background:#fff;color:#111}
.btn-csv{background:#2563EB;color:#fff}
.btn-reset{background:rgba(255,255,255,.1);color:#fff;font-size:11px}
.save-indicator{font-size:11px;color:#6b7280;align-self:center;white-space:nowrap}

/* ── Scene sections ── */
.scene-section{margin:24px 24px 0}
.scene-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px 8px 0 0;color:#fff;font-weight:700;font-size:14px}
.scene-header .scene-count{font-weight:400;font-size:12px;opacity:.8;margin-left:auto}

/* ── Table ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
thead th{padding:9px 12px;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#6b7280;background:#f9f9f7;border-bottom:1.5px solid #e5e5e3;text-align:left}
tbody tr{border-bottom:1px solid #f0f0ee}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafaf8}
td{padding:8px 12px;vertical-align:middle}

/* ── Columns ── */
.col-photo{width:52px}
.col-name{width:160px;font-weight:600}
.col-agency{width:130px;color:#6b7280;font-size:11px}
.col-groesse{width:110px}
.col-hose{width:90px}
.col-schuh{width:80px}
.col-anmerkung{min-width:200px}

/* ── Photo ── */
.talent-photo{width:40px;height:48px;object-fit:cover;border-radius:4px;display:block}
.talent-photo-placeholder{width:40px;height:48px;border-radius:4px;background:#e5e5e3;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999}

/* ── Inputs ── */
select,input[type="text"],input[type="number"]{width:100%;border:1.5px solid #e0e0dd;border-radius:5px;padding:5px 8px;font-size:12px;font-family:inherit;background:#fff;color:#111;outline:none;transition:border-color .15s}
select:focus,input:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
select.filled,input.filled{border-color:#16A34A;background:#f0fdf4}

.nr{font-size:10px;color:#bbb;text-align:center;width:28px}

/* ── Scene colors ── */
.s1-bg{background:#2563EB}
.s2-bg{background:#16A34A}
.s3-bg{background:#EA580C}
.s4-bg{background:#9333EA}

/* ── Print ── */
@media print {
  body{background:#fff;font-size:11px}
  .page-header{background:#111 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:14px 20px}
  .header-actions,.save-indicator{display:none}
  .scene-section{margin:16px 0 0;break-inside:avoid}
  .scene-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;border-radius:0}
  table{box-shadow:none;border:1px solid #ddd}
  thead th{background:#f5f5f5 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  input,select{border:none;border-bottom:1px solid #ccc;border-radius:0;padding:2px 4px;font-size:11px}
  .col-anmerkung{min-width:240px}
  tbody tr{break-inside:avoid}
  .btn-reset{display:none}
}

/* ── Summary bar ── */
.summary-bar{background:#fff;border-radius:8px;padding:12px 16px;margin:0 24px 24px;display:flex;gap:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:wrap}
.summary-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#6b7280}
.summary-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.summary-item strong{color:#111}

.toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}

.page-footer{text-align:center;padding:24px;color:#bbb;font-size:11px}
</style>

// ── State ──────────────────────────────────────────────────────────────────
let stylingData = {};

function load() {
  try { stylingData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { stylingData = {}; }
}

let saveTimer;
function schedSave() {
  clearTimeout(saveTimer);
  document.getElementById('save-indicator').textContent = 'Wird gespeichert…';
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stylingData));
    document.getElementById('save-indicator').textContent = 'Gespeichert ✓';
    updateFilledCount();
  }, 600);
}

function updateFilledCount() {
  const filled = Object.values(stylingData).filter(d => d.groesse && d.groesse !== '').length;
  document.getElementById('cnt-filled').textContent = filled;
}

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('scenes-container');
  container.innerHTML = '';

  scenes.forEach(sc => {
    const group = talents.filter(t => t.scene === sc.id);
    if (!group.length) return;

    const section = document.createElement('div');
    section.className = 'scene-section';

    section.innerHTML = `
      <div class="scene-header ${sc.cls}">
        ${sc.label}
        <span class="scene-count">${group.length} Talente</span>
      </div>
      <table>
        <thead>
          <tr>
            <th class="nr">#</th>
            <th class="col-photo"></th>
            <th class="col-name">Name</th>
            <th class="col-agency">Agentur</th>
            <th class="col-groesse">Tracksuit Größe</th>
            <th class="col-hose">Hose</th>
            <th class="col-schuh">Schuhgröße</th>
            <th class="col-anmerkung">Anmerkung / Besonderheiten</th>
          </tr>
        </thead>
        <tbody id="tbody-${sc.id}"></tbody>
      </table>
    `;
    container.appendChild(section);

    const tbody = section.querySelector(`#tbody-${sc.id}`);
    group.forEach((t, i) => {
      const key = t.folder;
      const d = stylingData[key] || {};
      const imgSrc = `casting_images/${t.folder}/headshot.jpg`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="nr">${i + 1}</td>
        <td class="col-photo">
          <img class="talent-photo" src="${imgSrc}" alt="${t.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="talent-photo-placeholder" style="display:none">?</div>
        </td>
        <td class="col-name">${t.name}</td>
        <td class="col-agency">${t.agency}</td>
        <td class="col-groesse">
          <select data-key="${key}" data-field="groesse" onchange="handleChange(this)">
            <option value="">– Größe</option>
            <option value="XS"  ${d.groesse==='XS'  ?'selected':''}>XS</option>
            <option value="S"   ${d.groesse==='S'   ?'selected':''}>S</option>
            <option value="M"   ${d.groesse==='M'   ?'selected':''}>M</option>
            <option value="L"   ${d.groesse==='L'   ?'selected':''}>L</option>
            <option value="XL"  ${d.groesse==='XL'  ?'selected':''}>XL</option>
            <option value="XXL" ${d.groesse==='XXL' ?'selected':''}>XXL</option>
            <option value="XXXL"${d.groesse==='XXXL'?'selected':''}>XXXL</option>
          </select>
        </td>
        <td class="col-hose">
          <select data-key="${key}" data-field="hose" onchange="handleChange(this)">
            <option value="">– Größe</option>
            <option value="XS"  ${d.hose==='XS'  ?'selected':''}>XS</option>
            <option value="S"   ${d.hose==='S'   ?'selected':''}>S</option>
            <option value="M"   ${d.hose==='M'   ?'selected':''}>M</option>
            <option value="L"   ${d.hose==='L'   ?'selected':''}>L</option>
            <option value="XL"  ${d.hose==='XL'  ?'selected':''}>XL</option>
            <option value="XXL" ${d.hose==='XXL' ?'selected':''}>XXL</option>
            <option value="XXXL"${d.hose==='XXXL'?'selected':''}>XXXL</option>
          </select>
        </td>
        <td class="col-schuh">
          <input type="text" inputmode="numeric" placeholder="38"
            data-key="${key}" data-field="schuh"
            value="${d.schuh || ''}"
            oninput="handleChange(this)">
        </td>
        <td class="col-anmerkung">
          <input type="text" placeholder="Anmerkungen, Änderungen, Sonstiges…"
            data-key="${key}" data-field="anmerkung"
            value="${d.anmerkung || ''}"
            oninput="handleChange(this)">
        </td>
      `;
      tbody.appendChild(tr);

      // Mark filled fields
      tr.querySelectorAll('select, input').forEach(el => markFilled(el));
    });
  });

  updateFilledCount();
}

function handleChange(el) {
  const key   = el.dataset.key;
  const field = el.dataset.field;
  if (!stylingData[key]) stylingData[key] = {};
  stylingData[key][field] = el.value;
  markFilled(el);
  schedSave();
}

function markFilled(el) {
  el.classList.toggle('filled', !!el.value && el.value !== '');
}

// ── CSV Export ──────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Szene','Name','Agentur','Tracksuit Größe','Hose','Schuhgröße','Anmerkung']];
  const sceneLabels = {s1:'S1 – Parkplatz',s2:'S2 – Kühlregal',s3:'S3 – Stau',s4:'S4 – Vorgarten'};
  talents.forEach(t => {
    const d = stylingData[t.folder] || {};
    rows.push([
      sceneLabels[t.scene] || t.scene,
      t.name,
      t.agency,
      d.groesse    || '',
      d.hose       || '',
      d.schuh      || '',
      d.anmerkung  || '',
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Styling_Kaufland_Ice_2026.csv';
  a.click();
}

// ── Reset ───────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Alle Styling-Daten zurücksetzen?')) return;
  stylingData = {};
  localStorage.removeItem(STORAGE_KEY);
  render();
  showToast('Zurückgesetzt');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>

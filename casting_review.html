<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaufland Ice Ice — Casting Auswahl</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#EFEFEF;color:#1a1a1a;min-height:100vh}

/* ─── HEADER ─────────────────────────────── */
header{background:#1A1A1A;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.brand{display:flex;align-items:center;gap:12px}
.brand h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.brand h1 span{color:#CC0000}
.brand .sub{font-size:12px;color:#888;letter-spacing:.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:16px}
.stats-pill{background:#2a2a2a;border-radius:20px;padding:6px 14px;font-size:12px;color:#ccc;display:flex;gap:12px}
.stats-pill strong{color:#fff}
.btn-export{background:#CC0000;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-export:hover{background:#a00000}

/* ─── TOOLBAR ────────────────────────────── */
.toolbar{background:#fff;border-bottom:1px solid #ddd;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:57px;z-index:99}
.search-wrap{position:relative;flex:0 0 200px}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.search-wrap input:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:14px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#555;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#888;color:#1a1a1a}
.fbtn.active{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
.fbtn.scene-active{color:#fff;border-color:transparent}
.agency-select{padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;color:#555;outline:none;cursor:pointer}
.agency-select:focus{border-color:#2563EB}

/* ─── GRID ───────────────────────────────── */
main{padding:24px;max-width:1800px;margin:0 auto}
.talent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.talent-card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;border:2px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.talent-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.talent-card.archived{opacity:.45;filter:grayscale(.7)}
.talent-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.card-info{padding:10px 10px 8px}
.card-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-agency{font-size:11px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-scene{font-size:10px;font-weight:600;letter-spacing:.3px;margin-top:6px;padding:2px 7px;border-radius:10px;display:inline-block;color:#fff}
.card-archived-badge{position:absolute;top:8px;right:8px;background:#6B7280;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}
.no-results{grid-column:1/-1;text-align:center;padding:60px;color:#888;font-size:15px}

/* ─── LIGHTBOX ───────────────────────────── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lb-card{background:#fff;border-radius:14px;overflow:hidden;width:100%;max-width:1000px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.lb-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lb-title{font-size:20px;font-weight:700}
.lb-agency-label{font-size:13px;color:#888;margin-top:2px}
.lb-close{background:none;border:none;font-size:28px;cursor:pointer;color:#888;line-height:1;padding:4px;border-radius:6px;transition:background .1s}
.lb-close:hover{background:#f0f0f0;color:#1a1a1a}
.lb-body{display:grid;grid-template-columns:1fr 300px;flex:1;overflow:hidden;min-height:0}
.lb-gallery{display:flex;flex-direction:column;background:#1a1a1a;position:relative;overflow:hidden}
.lb-main{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.lb-main img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2}
.lb-nav:hover{background:rgba(0,0,0,.8)}
.lb-prev{left:12px}
.lb-next{right:12px}
.lb-counter{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;font-size:12px;padding:3px 10px;border-radius:10px}
.lb-thumbs{display:flex;gap:4px;padding:8px;overflow-x:auto;background:#111;flex-shrink:0}
.lb-thumbs::-webkit-scrollbar{height:4px}
.lb-thumbs::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.lb-thumb{width:48px;height:64px;object-fit:cover;border-radius:4px;cursor:pointer;opacity:.5;transition:opacity .15s;border:2px solid transparent;flex-shrink:0}
.lb-thumb:hover{opacity:.85}
.lb-thumb.active{opacity:1;border-color:#fff}
.lb-form{padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;border-left:1px solid #eee}
.lb-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:10px}
.scene-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:4px;transition:background .15s;font-size:13px;font-weight:500;cursor:pointer}
.scene-row:hover{background:#f5f5f5}
.scene-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#1A1A1A;flex-shrink:0}
.scene-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.scene-row-label{flex:1}
.role-sel{border:1px solid #ddd;border-radius:6px;padding:3px 6px;font-size:11px;font-family:inherit;color:#555;background:#fff;cursor:pointer;outline:none;transition:border-color .15s;display:none}
.role-sel.visible{display:block}
.role-sel:focus{border-color:#999}
.clear-scene{color:#888;font-size:12px;cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block}
.clear-scene:hover{color:#1a1a1a}
.card-scenes{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.card-scene{font-size:9px;font-weight:700;letter-spacing:.3px;padding:2px 6px;border-radius:8px;display:inline-block;color:#fff}
.select-badge{position:absolute;top:8px;left:8px;background:#16A34A;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}
#lb-notes{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;resize:vertical;min-height:80px;outline:none;font-family:inherit}
#lb-notes:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.lb-actions{display:flex;gap:8px;margin-top:auto}
.btn-archive{flex:1;padding:10px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#6B7280;transition:all .15s}
.btn-archive:hover{border-color:#6B7280;background:#f5f5f5}
.btn-archive.is-archived{background:#6B7280;color:#fff;border-color:#6B7280}
.btn-save{flex:1;padding:10px;border-radius:8px;border:none;background:#1A1A1A;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#333}

/* ─── TOAST ──────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── EXPORT MODAL ───────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-card{background:#fff;border-radius:14px;padding:32px;max-width:500px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.modal-card h2{font-size:18px;margin-bottom:8px}
.modal-card p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px}
.btn-csv{flex:1;padding:12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-csv:hover{border-color:#888}
.btn-json{flex:1;padding:12px;border-radius:8px;border:none;background:#1A1A1A;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-json:hover{background:#333}
.btn-modal-close{padding:10px 20px;border-radius:8px;border:none;background:#f0f0f0;font-size:14px;cursor:pointer;margin-top:10px;width:100%}

@media(max-width:700px){
  .lb-body{grid-template-columns:1fr}
  .lb-form{border-left:none;border-top:1px solid #eee}
}
</style>
</head>

<header>
  <div class="brand">
    <div>
      <h1>Kaufland <span>Ice Ice</span></h1>
      <div class="sub">Casting Auswahl · 2026</div>
    </div>
  </div>

    <div class="stats-pill" id="stats">
      <span><strong id="stat-total">–</strong> Talents</span>
      <span><strong id="stat-assigned">0</strong> zugewiesen</span>
      <span><strong id="stat-archived">0</strong> archiviert</span>
    </div>
    <button class="btn-export" onclick="openExportModal()">Export ↓</button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Name suchen…" oninput="applyFilters()">
  </div>
  <div class="filter-group" id="filter-btns">
    <button class="fbtn active" data-filter="all" onclick="setFilter('all',this)">Alle</button>
    <button class="fbtn" data-filter="unassigned" onclick="setFilter('unassigned',this)">Nicht zugewiesen</button>
    <button class="fbtn" data-filter="s1" onclick="setFilter('s1',this)" style="--sc:#2563EB">Szene 1</button>
    <button class="fbtn" data-filter="s2" onclick="setFilter('s2',this)" style="--sc:#16A34A">Szene 2</button>
    <button class="fbtn" data-filter="s3" onclick="setFilter('s3',this)" style="--sc:#EA580C">Szene 3</button>
    <button class="fbtn" data-filter="s4" onclick="setFilter('s4',this)" style="--sc:#9333EA">Szene 4</button>
    <button class="fbtn" data-filter="s5" onclick="setFilter('s5',this)" style="--sc:#CC0000">Szene 5</button>
    <button class="fbtn" data-filter="selects" onclick="setFilter('selects',this)">✓ Selects</button>
    <button class="fbtn" data-filter="archived" onclick="setFilter('archived',this)">Archiviert</button>
  </div>
  <select class="agency-select" id="agency-filter" onchange="applyFilters()">
    <option value="">Alle Agenturen</option>
  </select>
</div>

<main>
  <div class="talent-grid" id="talent-grid"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
  <div class="lb-card">
    <div class="lb-header">
      <div>
        <div class="lb-title" id="lb-name"></div>
        <div class="lb-agency-label" id="lb-agency"></div>
      </div>
      <button class="lb-close" onclick="closeLightbox()">×</button>
    </div>
    <div class="lb-body">
      <div class="lb-gallery">
        <div class="lb-main">
          <img id="lb-img" src="" alt="">
          <button class="lb-nav lb-prev" onclick="navImg(-1)">‹</button>
          <button class="lb-nav lb-next" onclick="navImg(1)">›</button>
          <div class="lb-counter" id="lb-counter"></div>
        </div>
        <div class="lb-thumbs" id="lb-thumbs"></div>
      </div>
      <div class="lb-form">
        <div class="lb-section">
          <h3>Szenen zuweisen <span style="font-weight:400;font-size:11px;color:#aaa">(mehrere möglich)</span></h3>
          <div id="scene-options"></div>
          <span class="clear-scene" onclick="clearAllScenes()">Alle entfernen</span>
        </div>
        <div class="lb-section">
          <h3>Notizen</h3>
          <textarea id="lb-notes" placeholder="Anmerkungen zum Talent…"></textarea>
        </div>
        <div class="lb-actions">
          <button class="btn-archive" id="btn-archive" onclick="toggleArchive()">Archivieren</button>
          <button class="btn-save" onclick="saveSelection()">Speichern ✓</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="export-modal" onclick="modalBgClick(event)">
  <div class="modal-card">
    <h2>Auswahl exportieren</h2>
    <p id="export-info">Aktuelle Auswahl als Datei herunterladen.</p>
    <div class="modal-actions">
      <button class="btn-csv" onclick="doExport('csv')">CSV herunterladen</button>
      <button class="btn-json" onclick="doExport('json')">JSON herunterladen</button>
    </div>
    <button class="btn-modal-close" onclick="closeExportModal()">Abbrechen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Migration: old {scene:'s1'} → new {scenes:[{scene:'s1',role:''}]} ───────────────────────────
function migrateState(raw) {
  const out = {};
  Object.keys(raw).forEach(k => {
    const s = raw[k];
    out[k] = {
      scenes:   s.scenes ? s.scenes : (s.scene ? [{scene:s.scene, role:''}] : []),
      notes:    s.notes    || '',
      archived: s.archived || false,
    };
  });
  return out;
}

// ── Init ────────────────────────────────────────────────────────────────────────────
function init() {
  try { state = migrateState(JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')); } catch(e) { state = {}; }

  const sel = document.getElementById('agency-filter');
  agencies.forEach(ag => {
    const opt = document.createElement('option');
    opt.value = ag; opt.textContent = ag;
    sel.appendChild(opt);
  });

  renderGrid();
  updateStats();

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'ArrowLeft')  navImg(-1);
      if (e.key === 'ArrowRight') navImg(1);
    }
  });
}

// ── Grid ──────────────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('talent-grid');
  grid.innerHTML = '';
  const visible = getVisibleTalents();

  if (visible.length === 0) {
    grid.innerHTML = '<div class="no-results">Keine Talents gefunden</div>';
    return;
  }

  visible.forEach(({ talent, idx }) => {
    const s = state[idx] || {};
    const sceneList = s.scenes || [];
    const isSelect = SELECTS_FOLDERS.has(talent.folder);

    const card = document.createElement('div');
    card.className = 'talent-card' + (s.archived ? ' archived' : '');
    card.id = 'card-' + idx;
    card.onclick = () => openLightbox(idx);

    // Border = first assigned scene color, or green for selects
    if (sceneList.length > 0) {
      card.style.borderColor = sceneMap[sceneList[0].scene]?.color || '#ddd';
    } else if (isSelect) {
      card.style.borderColor = '#16A34A';
    }

    const imgPath = 'casting_images/' + talent.folder + '/' + (talent.images[0] || 'headshot.jpg');

    const badgesHtml = sceneList.map(a => {
      const sc = sceneMap[a.scene];
      if (!sc) return '';
      const shortLabel = sc.label.split('–')[0].trim();
      const roleLabel = a.role ? ' · ' + a.role : '';
      return `<span class="card-scene" style="background:${sc.color}">${shortLabel}${roleLabel}</span>`;
    }).join('');

    card.innerHTML =
      '<img src="' + imgPath + '" alt="' + talent.name + '" loading="lazy">' +
      (isSelect ? '<div class="select-badge">✓ Select</div>' : '') +
      (s.archived ? '<div class="card-archived-badge">Archiv</div>' : '') +
      '<div class="card-info">' +
        '<div class="card-name">' + talent.name + '</div>' +
        '<div class="card-agency">' + talent.agency + '</div>' +
        (badgesHtml ? '<div class="card-scenes">' + badgesHtml + '</div>' : '') +
      '</div>';

    grid.appendChild(card);
  });
}

function getVisibleTalents() {
  const q  = document.getElementById('search').value.toLowerCase().trim();
  const ag = document.getElementById('agency-filter').value;

  return talents.map((t, idx) => ({ talent: t, idx })).filter(({ talent, idx }) => {
    const s = state[idx] || {};
    const sceneList = s.scenes || [];
    if (q && !talent.name.toLowerCase().includes(q) && !talent.agency.toLowerCase().includes(q)) return false;
    if (ag && talent.agency !== ag) return false;
    switch (activeFilter) {
      case 'all':        return !s.archived;
      case 'unassigned': return !s.archived && sceneList.length === 0;
      case 'archived':   return s.archived;
      case 'selects':    return SELECTS_FOLDERS.has(talent.folder);
      case 's1': case 's2': case 's3': case 's4': case 's5':
        return !s.archived && sceneList.some(a => a.scene === activeFilter);
      default: return !s.archived;
    }
  });
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.classList.remove('active','scene-active');
    b.style.background = ''; b.style.color = ''; b.style.borderColor = '';
  });
  btn.classList.add('active');
  const sc = sceneMap[f];
  if (sc) { btn.style.background = sc.color; btn.style.color = '#fff'; btn.style.borderColor = sc.color; btn.classList.add('scene-active'); }
  else if (f === 'selects') { btn.style.background = '#16A34A'; btn.style.color = '#fff'; btn.style.borderColor = '#16A34A'; }
  renderGrid();
}

function applyFilters() { renderGrid(); }

function updateStats() {
  document.getElementById('stat-total').textContent = talents.length;
  const vals = Object.values(state);
  document.getElementById('stat-assigned').textContent = vals.filter(s => (s.scenes||[]).length > 0 && !s.archived).length;
  document.getElementById('stat-archived').textContent = vals.filter(s => s.archived).length;
}

// ── Lightbox ──────────────────────────────────────────────────────────────────────
function openLightbox(idx) {
  current = idx; imgIdx = 0;
  const t = talents[idx];
  const s = state[idx] || {};
  const sceneList = s.scenes || [];

  document.getElementById('lb-name').textContent = t.name;
  document.getElementById('lb-agency').textContent = t.agency;
  document.getElementById('lb-notes').value = s.notes || '';

  const archBtn = document.getElementById('btn-archive');
  if (s.archived) { archBtn.textContent = 'Reaktivieren'; archBtn.classList.add('is-archived'); }
  else { archBtn.textContent = 'Archivieren'; archBtn.classList.remove('is-archived'); }

  buildSceneOptions(sceneList);

  const thumbs = document.getElementById('lb-thumbs');
  thumbs.innerHTML = '';
  t.images.forEach((img, i) => {
    const th = document.createElement('img');
    th.src = 'casting_images/' + t.folder + '/' + img;
    th.className = 'lb-thumb' + (i === 0 ? ' active' : '');
    th.onclick = () => setImg(i);
    thumbs.appendChild(th);
  });

  setImg(0);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildSceneOptions(sceneList) {
  const opts = document.getElementById('scene-options');
  opts.innerHTML = '';
  scenes.forEach(sc => {
    const assigned = sceneList.find(a => a.scene === sc.id);
    const row = document.createElement('div');
    row.className = 'scene-row';
    row.onclick = (e) => { if (e.target.tagName !== 'SELECT' && e.target.tagName !== 'INPUT') toggleScene(sc.id); };

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!assigned;
    cb.onchange = () => toggleScene(sc.id);

    const dot = document.createElement('div');
    dot.className = 'scene-dot';
    dot.style.background = sc.color;

    const lbl = document.createElement('span');
    lbl.className = 'scene-row-label';
    lbl.textContent = sc.label;
    lbl.style.color = sc.color;

    const roleSel = document.createElement('select');
    roleSel.className = 'role-sel' + (assigned ? ' visible' : '');
    roleSel.dataset.scene = sc.id;
    roleSel.onclick = e => e.stopPropagation();
    roleSel.onchange = () => setSceneRole(sc.id, roleSel.value);
    ROLE_OPTIONS.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.value; opt.textContent = r.label;
      if (assigned && assigned.role === r.value) opt.selected = true;
      roleSel.appendChild(opt);
    });

    row.appendChild(cb);
    row.appendChild(dot);
    row.appendChild(lbl);
    row.appendChild(roleSel);
    opts.appendChild(row);
  });
}

function toggleScene(sceneId) {
  if (!state[current]) state[current] = { scenes:[], notes:'', archived:false };
  if (!state[current].scenes) state[current].scenes = [];
  const idx = state[current].scenes.findIndex(a => a.scene === sceneId);
  if (idx === -1) {
    state[current].scenes.push({ scene: sceneId, role: '' });
  } else {
    state[current].scenes.splice(idx, 1);
  }
  buildSceneOptions(state[current].scenes);
}

function setSceneRole(sceneId, role) {
  if (!state[current]?.scenes) return;
  const a = state[current].scenes.find(a => a.scene === sceneId);
  if (a) a.role = role;
}

function clearAllScenes() {
  if (!state[current]) state[current] = { scenes:[], notes:'', archived:false };
  state[current].scenes = [];
  buildSceneOptions([]);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  current = null;
}

function lbBgClick(e) {
  if (e.target.id === 'lightbox') closeLightbox();
}

function setImg(i) {
  const t = talents[current];
  imgIdx = Math.max(0, Math.min(i, t.images.length - 1));
  document.getElementById('lb-img').src = 'casting_images/' + t.folder + '/' + t.images[imgIdx];
  document.getElementById('lb-counter').textContent = (imgIdx + 1) + ' / ' + t.images.length;
  document.querySelectorAll('.lb-thumb').forEach((th, j) => th.classList.toggle('active', j === imgIdx));
  const thumbs = document.getElementById('lb-thumbs');
  const active = thumbs.children[imgIdx];
  if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

function navImg(dir) { setImg(imgIdx + dir); }

function toggleArchive() {
  if (!state[current]) state[current] = { scenes:[], notes:'', archived:false };
  state[current].archived = !state[current].archived;
  const archBtn = document.getElementById('btn-archive');
  if (state[current].archived) { archBtn.textContent = 'Reaktivieren'; archBtn.classList.add('is-archived'); }
  else { archBtn.textContent = 'Archivieren'; archBtn.classList.remove('is-archived'); }
  persist(); updateStats();
  const card = document.getElementById('card-' + current);
  if (card) card.classList.toggle('archived', state[current].archived);
}

function saveSelection() {
  if (current === null) return;
  if (!state[current]) state[current] = { scenes:[], notes:'', archived:false };
  state[current].notes = document.getElementById('lb-notes').value;
  persist(); updateStats(); renderGrid();
  showToast('Gespeichert ✓');
  setTimeout(closeLightbox, 500);
}

// ── Persistence ───────────────────────────────────────────────────────────────────────────
function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Export ──────────────────────────────────────────────────────────────────────────────
function openExportModal() {
  const assigned = Object.values(state).filter(s => ((s.scenes||[]).length > 0 || s.archived || s.notes));
  document.getElementById('export-info').textContent =
    assigned.length + ' Talents mit Notizen oder Zuweisung werden exportiert.';
  document.getElementById('export-modal').classList.add('open');
}
function closeExportModal() { document.getElementById('export-modal').classList.remove('open'); }
function modalBgClick(e) { if (e.target.id === 'export-modal') closeExportModal(); }

function doExport(fmt) {
  const rows = talents.map((t, idx) => {
    const s = state[idx] || {};
    const sceneList = s.scenes || [];
    const scenesStr = sceneList.map(a => {
      const sc = sceneMap[a.scene];
      return sc ? sc.label + (a.role ? ` (${a.role})` : '') : '';
    }).filter(Boolean).join('; ');
    return { name: t.name, agency: t.agency, szenen: scenesStr, archiviert: s.archived ? 'ja' : 'nein', notizen: s.notes || '' };
  }).filter(r => r.szenen || r.archiviert === 'ja' || r.notizen);

  if (rows.length === 0) { showToast('Keine Auswahl zum Exportieren'); closeExportModal(); return; }

  let content, mime, ext;
  if (fmt === 'csv') {
    const header = 'Name,Agentur,Szenen,Archiviert,Notizen';
    const lines = rows.map(r =>
      [r.name, r.agency, r.szenen, r.archiviert, r.notizen].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')
    );
    content = [header, ...lines].join('\n');
    mime = 'text/csv'; ext = 'csv';
  } else {
    content = JSON.stringify(rows, null, 2);
    mime = 'application/json'; ext = 'json';
  }

  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'casting_auswahl_kaufland.' + ext;
  a.click(); URL.revokeObjectURL(url);
  closeExportModal();
  showToast('Export erfolgreich ↓');
}

// ── Toast ──────────────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Boot ──────────────────────────────────────────────────────────────────────────────
init();
</script>
